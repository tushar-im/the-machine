# Agent: Zoe
# Provider: xAI Grok 4.1 Fast (OpenAI-compatible)

api_key = "PLACEHOLDER_API_KEY"
default_provider = "openai"
default_model = "PLACEHOLDER_MODEL"
default_temperature = PLACEHOLDER_TEMPERATURE
api_url = "PLACEHOLDER_API_BASE_URL"

[gateway]
port = PLACEHOLDER_GATEWAY_PORT
host = "0.0.0.0"
require_pairing = false
allow_public_bind = true

[memory]
backend = "sqlite"
auto_save = true

[autonomy]
level = "supervised"
workspace_only = false
allowed_commands = [
  "bash", "sh",
  "node", "npm", "npx",
  "python3", "pip",
  "git",
  "cat", "ls", "mkdir", "cp", "mv", "rm", "find", "grep", "sed", "awk",
  "curl", "wget",
  "jq", "echo", "pwd", "wc", "head", "tail", "date",
  "canvas-post"
]
forbidden_paths = []
max_actions_per_hour = 100
max_cost_per_day_cents = 5000

[channels_config]
cli = false

[channels_config.slack]
bot_token = "PLACEHOLDER_SLACK_BOT_TOKEN"
app_token = "PLACEHOLDER_SLACK_APP_TOKEN"
allowed_users = ["PLACEHOLDER_SLACK_USER_ID"]

[skills]
open_skills_enabled = false

[heartbeat]
enabled = false
interval_minutes = 30
